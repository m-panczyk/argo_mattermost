apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      # Init container fixes PVC permissions once
      initContainers:
      - name: init-permissions
        image: busybox:latest
        command: ['sh', '-c', 'mkdir -p /mattermost/data /mattermost/logs /mattermost/plugins && chmod 777 /mattermost/data /mattermost/logs /mattermost/plugins']
        volumeMounts:
        - name: data
          mountPath: /mattermost/data
      
      containers:
      - name: mattermost
        # Official mattermost image with ARM64 support
        image: mattermost/mattermost-team-edition:latest
        imagePullPolicy: IfNotPresent
        
        env:
        - name: MM_SQLSETTINGS_DATASOURCE
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SQLSETTINGS_DATASOURCE
        - name: MM_SERVICESETTINGS_SITEURL
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SERVICESETTINGS_SITEURL
        - name: MM_SQLSETTINGS_DRIVERNAME
          value: postgres
        - name: MM_SERVICESETTINGS_LISTENADDRESS
          value: ":8065"
        # Send logs to stdout instead of file (Kubernetes best practice)
        - name: MM_LOGSETTINGS_ENABLEFILE
          value: "false"
        - name: MM_LOGSETTINGS_ENABLECONSOLE
          value: "true"
        - name: MM_LOGSETTINGS_CONSOLELEVEL
          value: "ERROR"
        
        ports:
        - containerPort: 8065
          name: http
        
        readinessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5
        
        livenessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 90
          periodSeconds: 30
          failureThreshold: 3
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        volumeMounts:
        - name: data
          mountPath: /mattermost/data
        - name: data
          mountPath: /mattermost/logs
        - name: data
          mountPath: /mattermost/plugins
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mattermost-data-pvc
