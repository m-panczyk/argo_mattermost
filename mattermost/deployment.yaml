apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
      - name: mattermost
        image: rheens/mattermost-app:v11.3.0
        imagePullPolicy: Always
        command: ["/bin/sh", "/custom-entrypoint/entrypoint.sh"]
        env:
        - name: MM_SQLSETTINGS_DATASOURCE
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SQLSETTINGS_DATASOURCE
        - name: MM_SERVICESETTINGS_SITEURL
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SERVICESETTINGS_SITEURL
        - name: MM_SQLSETTINGS_DRIVERNAME
          value: postgres
        - name: MM_SERVICESETTINGS_LISTENADDRESS
          value: ":8065"
        - name: MM_LOGSETTINGS_ENABLEFILE
          value: "false"
        - name: MM_LOGSETTINGS_ENABLECONSOLE
          value: "true"
        - name: MM_LOGSETTINGS_CONSOLELEVEL
          value: "ERROR"
        - name: MM_SERVICESETTINGS_ENABLELOCALMODE
          value: "true"
        ports:
        - containerPort: 8065
          name: http
        readinessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /mattermost/data
          subPath: data
        - name: data
          mountPath: /mattermost/logs
          subPath: logs
        - name: data
          mountPath: /mattermost/plugins
          subPath: plugins
        - name: custom-entrypoint
          mountPath: /custom-entrypoint
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mattermost-data-pvc
      - name: custom-entrypoint
        configMap:
          name: mattermost-entrypoint
          defaultMode: 0755
