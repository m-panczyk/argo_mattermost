apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      containers:
      - name: mattermost
        image: mattermost/mattermost-team-edition:11.7.0
        imagePullPolicy: Always
        env:
        - name: MM_SQLSETTINGS_DATASOURCE
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SQLSETTINGS_DATASOURCE
        - name: MM_SERVICESETTINGS_SITEURL
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SERVICESETTINGS_SITEURL
        - name: MM_SERVICESETTINGS_LISTENADDRESS
          value: ":8065"
        - name: MM_SQLSETTINGS_DRIVERNAME
          value: postgres
        ports:
        - containerPort: 8065
        readinessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /mattermost/data
        - name: logs
          mountPath: /mattermost/logs
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mattermost-data-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: mattermost-logs-pvc
