apiVersion: apps/v1
kind: Deployment
metadata:
  name: mattermost
  namespace: mattermost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mattermost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mattermost
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 0
      initContainers:
      - name: init-config
        image: rheens/mattermost-app:v11.3.0
        command: ["/bin/sh", "-c"]
        args:
        - |
          if [ ! -f /mattermost/config/config.json ]; then
            jq --arg ds "$MM_SQLSETTINGS_DATASOURCE" \
              '.SqlSettings.DataSource = $ds
               | .SqlSettings.DriverName = "postgres"
               | .LogSettings.EnableConsole = true
               | .LogSettings.ConsoleLevel = "ERROR"
               | .FileSettings.Directory = "/mattermost/data/"
               | .PluginSettings.Directory = "/mattermost/plugins/"' \
              /mattermost/config.json.save > /mattermost/config/config.json
            echo "Config created with correct DataSource"
          else
            echo "Config already exists, skipping"
          fi
        env:
        - name: MM_SQLSETTINGS_DATASOURCE
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SQLSETTINGS_DATASOURCE
        volumeMounts:
        - name: config
          mountPath: /mattermost/config
      containers:
      - name: mattermost
        image: rheens/mattermost-app:v11.3.0
        imagePullPolicy: Always
        env:
        - name: MM_SQLSETTINGS_DATASOURCE
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SQLSETTINGS_DATASOURCE
        - name: MM_SERVICESETTINGS_SITEURL
          valueFrom:
            secretKeyRef:
              name: mattermost-app
              key: MM_SERVICESETTINGS_SITEURL
        - name: MM_LISTEN_ADDRESS
          value: "0.0.0.0:8065"
        - name: MM_SQLSETTINGS_DRIVERNAME
          value: postgres
        ports:
        - containerPort: 8065
        readinessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /api/v4/system/ping
            port: 8065
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /mattermost/data
        - name: logs
          mountPath: /mattermost/logs
        - name: config
          mountPath: /mattermost/config
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mattermost-data-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: mattermost-logs-pvc
      - name: config
        persistentVolumeClaim:
          claimName: mattermost-config-pvc
